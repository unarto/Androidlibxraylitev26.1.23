name: Build & Auto Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        required: false
        type: string
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write # WAJIB! Agar GitHub Actions punya akses membuat halaman rilis

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout repository
      uses: actions/checkout@v6.0.0
      
    - name: Setup Golang
      uses: actions/setup-go@v6.1.0
      with:
        go-version-file: 'go.mod'

    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        export PATH=$PATH:~/go/bin
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3.2.0
      with:
        log-accepted-android-sdk-licenses: false
        cmdline-tools-version: '12266719'
        packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

    - name: Install NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          --channel=0 \
          --install "ndk;28.2.13676358"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV

    - name: Build
      run: |
         mkdir -p assets data
         bash gen_assets.sh download
         cp -v data/*.dat assets/
         gomobile init
         go mod tidy
         gomobile bind -v -androidapi 24 -trimpath -ldflags='-s -w -buildid=' ./
 
    - name: Generate Release Tag
      run: |
        if [ -z "${{ github.event.inputs.release_tag }}" ]; then
          # Jika tag kosong (akibat push/PR/manual tanpa ketik tag), generate versi otomatis
          TAG="v1.0.${{ github.run_number }}"
        else
          TAG="${{ github.event.inputs.release_tag }}"
        fi
        echo "FINAL_TAG=$TAG" >> $GITHUB_ENV

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.FINAL_TAG }}
        name: "LibV2ray Release ${{ env.FINAL_TAG }}"
        body: |
          Hasil kompilasi otomatis `libv2ray.aar` menggunakan Go Mobile.
          
          **Detail Build:**
          - **Go Version:** Sesuai `go.mod`
          - **Android API Target:** 24 (Gomobile bind)
          - **NDK Version:** 28.2.13676358
          
          Tinggal download `libv2ray.aar` di bawah dan pasang di project V2rayNG lu!
        files: |
          ./libv2ray.aar
